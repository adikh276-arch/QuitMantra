<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QuitMantra — Lotus Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#ddd5c8;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif}
#phone{position:relative;width:390px;height:844px;border-radius:50px;overflow:hidden;box-shadow:0 60px 160px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.3);background:#fef6ec}
#scene{position:absolute;top:0;left:0;width:390px;height:520px;overflow:hidden}
#scene-bg{position:absolute;top:0;left:0;width:100%;height:100%}
#pixi-canvas{position:absolute;top:0;left:0;pointer-events:none}
#topbar{position:absolute;top:0;left:0;right:0;padding:52px 22px 0;display:flex;justify-content:space-between;align-items:center;z-index:10}
#wordmark{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:19px;letter-spacing:0.1em;color:rgba(255,255,255,0.95);text-shadow:0 1px 10px rgba(0,0,0,0.3)}
.icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.22);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;cursor:pointer}
#day-overlay{position:absolute;top:138px;left:0;right:0;display:flex;flex-direction:column;align-items:center;z-index:10;pointer-events:none}
#sober-tag{font-family:'DM Sans',sans-serif;font-weight:300;font-size:9px;letter-spacing:0.42em;text-transform:uppercase;color:rgba(255,255,255,0.78);text-shadow:0 1px 6px rgba(0,0,0,0.25);margin-bottom:4px}
#day-num{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:98px;line-height:1;color:#fff;text-shadow:0 2px 28px rgba(100,60,10,0.22),0 0 50px rgba(255,210,130,0.25);letter-spacing:-0.03em}
#day-word{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:20px;color:rgba(255,255,255,0.72);letter-spacing:0.2em;margin-top:2px;text-shadow:0 1px 8px rgba(0,0,0,0.2)}
#badge-pill{margin-top:14px;padding:5px 15px;background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.38);border-radius:20px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;color:rgba(255,255,255,0.92);letter-spacing:0.03em}
#sheet{position:absolute;bottom:0;left:0;right:0;background:#fffcf8;border-radius:0 0 50px 50px;border-top:1px solid rgba(200,180,150,0.18);padding:14px 20px 32px;z-index:10;height:334px}
#handle{width:38px;height:4px;background:#e0d4c4;border-radius:2px;margin:0 auto 18px}
#stats{display:flex;justify-content:space-around;margin-bottom:16px}
.stat{text-align:center}
.stat-n{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:28px;color:#2c1f0e;line-height:1}
.stat-l{font-family:'DM Sans',sans-serif;font-weight:300;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#a08060;margin-top:3px}
#next-ms{background:#fdf4ea;border:1px solid #f0ddc4;border-radius:14px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.ms-dot{width:8px;height:8px;border-radius:50%;background:#d4804a;flex-shrink:0;box-shadow:0 0 6px rgba(212,128,74,0.5)}
.ms-txt{font-family:'DM Sans',sans-serif;font-size:12px;color:#7a5030;line-height:1.45}
.ms-txt strong{color:#3c2010;font-weight:500}
#craving-btn{width:100%;padding:15px;border:none;border-radius:16px;cursor:pointer;background:linear-gradient(135deg,#e8845a,#c86030);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:white;letter-spacing:0.02em;margin-bottom:10px;animation:breathe 3.5s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 4px 18px rgba(200,96,48,0.35)}50%{box-shadow:0 6px 32px rgba(200,96,48,0.58)}}
#guide-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:1px solid #eeddc8;border-radius:14px;cursor:pointer}
#guide-ava{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#f0c888,#d89848);border:2px solid rgba(255,200,100,0.4);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.gi{flex:1}.gn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#2c1f0e}.gs{font-family:'DM Sans',sans-serif;font-size:11px;color:#a08060;margin-top:1px}.ga{color:#c8a888;font-size:16px}
#demo{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:rgba(40,20,0,0.78);backdrop-filter:blur(12px);border:1px solid rgba(255,200,150,0.22);border-radius:24px;padding:9px 18px;display:flex;align-items:center;gap:12px;z-index:999;white-space:nowrap}
#demo label{font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(255,220,180,0.68);letter-spacing:0.12em;text-transform:uppercase}
#day-slider{width:130px;accent-color:#e8845a;cursor:pointer}
#slider-v{font-family:'DM Sans',sans-serif;font-size:12px;color:#e8a870;min-width:44px;font-weight:500}
#loading{position:absolute;inset:0;background:#fef6ec;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;border-radius:50px;transition:opacity 0.7s ease}
#loading.gone{opacity:0;pointer-events:none}
.ll{font-size:38px;animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{transform:rotate(-12deg) scale(1)}50%{transform:rotate(12deg) scale(1.08)}}
.lt{font-family:'Cormorant Garamond',serif;font-size:18px;color:#8a6040;margin-top:12px;letter-spacing:0.08em}
</style>
</head>

// ══════════════════════════════════════════
//  SVG → PIXI Texture helper
// ══════════════════════════════════════════
async function toTex(svgStr, w, h) {
  const cv = document.createElement('canvas');
  const pr = 2; cv.width = w*pr; cv.height = h*pr;
  const ctx = cv.getContext('2d');
  const blob = new Blob([svgStr], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  await new Promise((res,rej)=>{
    const img = new Image();
    img.onload=()=>{ ctx.drawImage(img,0,0,w*pr,h*pr); URL.revokeObjectURL(url); res(); };
    img.onerror=rej; img.src=url;
  });
  return PIXI.Texture.from(cv);
}

// ══════════════════════════════════════════

const L = {

];

function build() {

    s.anchor.set(0.5,0.88); s.x=p.x+(Math.random()-.5)*8; s.y=p.y+9;
    s.scale.set(0.65+Math.random()*0.32); s.rotation=(Math.random()-.5)*0.65;
    s.alpha=0; s._ph=Math.random()*Math.PI*2; s._sw=0.012+Math.random()*0.01; s._ss=0.28+Math.random()*0.28;
    L.pads.addChild(s); pads.push(s);
  });
  // Lotuses
  LPOS.forEach((p,i)=>{
    const s=new PIXI.Sprite(TEX.bud);
    s.anchor.set(0.5,0.95); s.x=p.x; s.y=p.y;
    s.alpha=0; s.scale.set(0.78+Math.random()*0.26);
    s._ph=Math.random()*Math.PI*2; s._sw=0.028+Math.random()*0.02; s._ss=0.22+Math.random()*0.28;
    L.lotuses.addChild(s); lotuses.push(s);
  });
  // Fish
  [
    {tex:'koi', cx:195,cy:392,rx:118,ry:54,spd:0.18,off:0,    sc:0.7, al:0.72},
    {tex:'koi2',cx:184,cy:406,rx:88, ry:40,spd:0.13,off:2.3,  sc:0.56,al:0.65},
    {tex:'koi', cx:200,cy:376,rx:72, ry:33,spd:0.23,off:4.2,  sc:0.48,al:0.58},
  ].forEach(fd=>{
    const f=new PIXI.Sprite(TEX[fd.tex]);
    f.anchor.set(0.88,0.5); f.alpha=0; f._fd=fd; f._t=fd.off;
    L.fish.addChild(f); fish.push(f);
  });
  // Dragonfly
  dfSpr=new PIXI.Sprite(TEX.df);
  dfSpr.anchor.set(0.5,0.5); dfSpr.alpha=0; dfSpr.scale.set(0.92);
  dfSpr.x=158; dfSpr.y=354; L.df.addChild(dfSpr);
  // Fireflies
  for(let i=0;i<24;i++){
    const ff=new PIXI.Graphics();
    ff._x=48+Math.random()*(W-96); ff._y=328+Math.random()*136;
    ff._vx=(Math.random()-.5)*0.32; ff._vy=(Math.random()-.5)*0.24;
    ff._ph=Math.random()*Math.PI*2; ff._sp=0.65+Math.random()*1.1;
    ff.alpha=0; L.ff.addChild(ff); ffs.push(ff);
  }
  document.getElementById('loading').classList.add('gone');
  startLoop();
}

// ── RIPPLES ──
let ripT=0;
function spawnRip(x,y,big){
  RIPS.push({x,y,r:2,maxR:big?50:26+Math.random()*18,a:0.55,life:0});
  if(big) RIPS.push({x,y,r:5,maxR:74,a:0.32,life:0});
}
function animRips(dt){
  ripT+=dt;
  if(ripT>110){ripT=0;spawnRip(100+Math.random()*190,356+Math.random()*80,false);}
  ripGfx.clear();
  for(let i=RIPS.length-1;i>=0;i--){
    const r=RIPS[i]; r.r+=0.44; r.a-=0.006;
    if(r.a<=0||r.r>r.maxR){RIPS.splice(i,1);continue;}
    ripGfx.lineStyle(1.2,0x78c0b0,r.a*0.52);
    ripGfx.drawEllipse(r.x,r.y,r.r,r.r*0.42);
    if(r.r>8){ripGfx.lineStyle(0.7,0x78c0b0,r.a*0.22);ripGfx.drawEllipse(r.x,r.y,r.r*0.56,r.r*0.56*0.42);}
  }
}

// ── LOTUS SPRITES ──
function getT(stage){
  if(stage<0.24) return TEX.bud;
  if(stage<0.5)  return TEX.hbud;
  if(stage<0.77) return TEX.hblm;
  return TEX.full;
}
function updLotuses(day,t){
  lotuses.forEach((s,i)=>{
    const active=i<day;
    if(!active){s.alpha=0;pads[i].alpha=0;return;}
    const dOld=day-i; const stage=Math.min(1,dOld/5);
    s.alpha+=(1-s.alpha)*0.06; pads[i].alpha+=(0.88-pads[i].alpha)*0.05;
    const nx=getT(stage);
    if(s.texture!==nx){s.texture=nx;s.anchor.set(0.5,0.95);}
    s.rotation=Math.sin(t*s._ss+s._ph)*s._sw;
    pads[i].rotation=Math.sin(t*pads[i]._ss+pads[i]._ph)*pads[i]._sw*0.55;
  });
}

// ── FISH ──
function animFish(day,dt){
  fish.forEach((f,i)=>{
    const show=day>=3+i*2;
    f.alpha+=(( show?f._fd.al:0)-f.alpha)*0.038;
    if(!show)return;
    f._t+=dt*0.016*f._fd.spd;
    const t=f._t,fd=f._fd;
    f.x=fd.cx+Math.cos(t)*fd.rx; f.y=fd.cy+Math.sin(t*2)*fd.ry*0.46;
    const vx=-Math.sin(t)*fd.rx;
    f.scale.x=fd.sc*(vx<0?-1:1); f.scale.y=fd.sc;
    f.rotation=Math.atan2(Math.cos(t*2)*fd.ry*0.46*2,vx);
  });
}

// ── DRAGONFLY ──
let dfTX=158,dfTY=354,dfCX=158,dfCY=354,dfRT=0;
function animDf(day,t,dt){
  const show=day>=7;
  dfSpr.alpha+=((show?0.9:0)-dfSpr.alpha)*0.04;
  if(!show)return;
  dfRT+=dt;
  if(dfRT>210){dfRT=0;dfTX=82+Math.random()*226;dfTY=328+Math.random()*148;}
  dfCX+=(dfTX-dfCX)*0.024; dfCY+=(dfTY-dfCY)*0.024+Math.sin(t*4.5)*0.38;
  dfSpr.x=dfCX; dfSpr.y=dfCY;
  dfSpr.scale.x=(dfTX-dfCX)<0?-0.92:0.92;
  dfSpr.scale.y=(0.88+Math.sin(t*17)*0.1)*0.92;
}

// ── FIREFLIES ──
function animFf(day,t){
  const show=day>=5;
  ffs.forEach(ff=>{
    const ta=show?0.9:0;
    ff.alpha+=(ta-ff.alpha)*0.028;
    if(ff.alpha<0.02)return;
    ff._x+=ff._vx+Math.sin(t*0.28+ff._ph)*0.26;
    ff._y+=ff._vy+Math.cos(t*0.36+ff._ph*1.2)*0.2;
    if(ff._x<42)ff._x=W-52; if(ff._x>W-42)ff._x=52;
    if(ff._y<322)ff._y=462; if(ff._y>468)ff._y=328;
    const g=Math.sin(t*ff._sp+ff._ph)*0.5+0.5;
    const a2=ff.alpha*(0.32+g*0.68);
    const r=1.45*(0.68+g*0.5);
    ff.clear();
    ff.beginFill(0xfaff80,a2*0.1); ff.drawCircle(ff._x,ff._y,r*5.5); ff.endFill();
    ff.beginFill(0xf5ff55,a2*0.52); ff.drawCircle(ff._x,ff._y,r); ff.endFill();
    ff.beginFill(0xffffff,a2*0.92); ff.drawCircle(ff._x,ff._y,r*0.38); ff.endFill();
  });
}

// ── LOOP ──
let today=1, T=0;
function startLoop(){
  app.ticker.add(dt=>{
    T+=dt*0.016;
    updLotuses(today,T); animFish(today,dt);
    animRips(dt); animDf(today,T,dt); animFf(today,T);
  });
}

// ── UI ──
const MS=[
  {d:0, b:'🌱',l:'First seed planted'},
  {d:7, b:'🪷',l:'First Bloom unlocked'},
  {d:14,b:'🐟',l:'The koi have arrived'},
  {d:21,b:'✨',l:'Dragonfly Days'},
  {d:30,b:'🌟',l:'Sacred Garden reached'},
];
const MN=[
  'Day 7 — First Bloom|Keep going, your lotus is budding',
  'Day 14 — The Koi Arrive|Your pond stirs with life',
  'Day 21 — Dragonfly Days|Watch the sky come alive',
  'Day 30 — Sacred Garden|Almost there, you\'re doing amazing',
  'Sacred Garden achieved!|You have truly transformed 🌸',
];
function updUI(d){
  document.getElementById('day-num').textContent=d;
  document.getElementById('s-days').textContent=d;
  document.getElementById('s-weeks').textContent=Math.floor(d/7);
  document.getElementById('s-hours').textContent=(d*24).toLocaleString();
  const b=MS.filter(m=>d>=m.d&&m.d>0).length;
  document.getElementById('s-badges').textContent=b;
  const cur=[...MS].reverse().find(m=>d>=m.d);
  document.getElementById('badge-pill').textContent=cur.b+' '+cur.l;
  const ni=Math.min(b,MN.length-1);
  const [st,sb]=MN[ni].split('|');
  document.getElementById('ms-txt').innerHTML=`<strong>${st}</strong><br>${sb}`;
}

// Slider
document.getElementById('day-slider').addEventListener('input',e=>{
  today=parseInt(e.target.value);
  document.getElementById('slider-v').textContent='Day '+today;
  updUI(today);
});

// Tap ripple
document.getElementById('phone').addEventListener('click',e=>{
  const r=document.getElementById('phone').getBoundingClientRect();
  const px=(e.clientX-r.left)*(390/r.width);
  const py=(e.clientY-r.top)*(844/r.height);
  if(py>292&&py<515&&px>18&&px<372) spawnRip(px,py,true);
});

updUI(1);
loadAll();
</script>
